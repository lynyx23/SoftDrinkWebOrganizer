<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beverage Catalogue</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../images/icon1.png">
  </head>
  <body>

    <nav class="retro-nav">
    <div class="nav-brand">
        <a href="../../index.html">The Soda Aisle</a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="sodalist.html">Catalog</a>
        
        <a href="login.html" class="nav-guest-only">Sign In</a>
        <a href="register.html" class="nav-btn nav-guest-only">Get a Cart</a>
        
        <a href="profile.html" class="nav-btn nav-auth-only hidden profile-nav-btn" >My Profile</a>
        <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
        <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
    </div>
    </nav>

    <script src="../js/nav.js"></script>

    <h1 class="lpheading">Beverage Catalogue</h1>

    <div id="catalog-container" class="catalog">
      <p>Loading beverages...</p>
    </div>

    <script>
      // Fetch beverages when the page loads
      document.addEventListener("DOMContentLoaded", () => {
        fetchBeverages();
      });

      function fetchBeverages() {
        fetch("/api/beverages")
          .then((response) => response.json())
          .then((data) => {
            const container = document.getElementById("catalog-container");
            container.innerHTML = "";

            // Check if the API call was successful and if there are beverages to display
            if (data.success && data.data.beverages.length > 0) {
              data.data.beverages.forEach((drink) => {
                // Create a card for each beverage
                const card = document.createElement("div");
                card.className = "beverage-card";
                card.innerHTML = `
                                <h3>${drink.name}</h3>
                                <img src="${drink.image_url}" alt="${drink.name}">
                                <p><strong>Category:</strong> ${drink.category}</p>
                                <p><strong>Volume:</strong> ${drink.volume_ml} ml</p>
                                <p><strong>Price:</strong> ${drink.price} RON</p>
                                <p><small>${drink.description}</small></p>
                            `;
                container.appendChild(card);
              });
            } else {
              container.innerHTML =
                "<p>No beverages found in the database.</p>";
            }
          })
          .catch((error) => {
            console.error("Error fetching data:", error);
            document.getElementById("catalog-container").innerHTML =
              "<p>Error connecting to the server.</p>";
          });
      }
    </script>
  </body>
</html>
