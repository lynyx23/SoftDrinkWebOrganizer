<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Admin Dashboard</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/admin.css" rel="stylesheet">
</head>
<body class="retro-theme">

  <nav class="retro-nav">
    <div class="nav-brand">
        <a href="../../index.html">The Soda Aisle</a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="sodalist.html">Catalog</a>
        
        <a href="login.html" class="nav-guest-only">Sign In</a>
        <a href="register.html" class="nav-btn nav-guest-only">Get a Cart</a>
        
        <a href="profile.html" class="nav-auth-only hidden">Profile</a>
        <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
        <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
    </div>
    </nav>

<h1 class="admin-heading">Admin Dashboard</h1>

<div id="admin-content" style="display: none">
    <div class="admin-container">

        <!-- Add Beverage Card -->
        <div class="admin-section">
            <h2>Add New Beverage</h2>
            <form id="addBeverageForm">
                <div class="form-group">
                    <label for="bevName">Name</label>
                    <input id="bevName" required type="text"/>
                </div>
                <div class="form-group">
                    <label for="bevCategory">Category (e.g., soda, tea, dairy)</label>
                    <input id="bevCategory" required type="text"/>
                </div>
                <div class="form-group">
                    <label for="bevPrice">Price (RON)</label>
                    <input id="bevPrice" required step="0.01" type="number"/>
                </div>
                <div class="form-group">
                    <label for="bevVolume">Volume (ml)</label>
                    <input id="bevVolume" type="number"/>
                </div>
                <div class="form-group">
                    <label for="bevImage">Image URL</label>
                    <input id="bevImage" type="text" value="../images/icon1.png"/>
                </div>
                <button class="retro-btn" type="submit">Save Beverage</button>
            </form>
        </div>

        <!-- Manage Users Card -->
        <div class="admin-section">
            <div class="admin-section-header">
                <h2>Manage Users</h2>
                <button class="retro-btn small-btn" id="refreshUsersBtn">Refresh List</button>
            </div>
            <div class="retro-list-container" id="users-container">
                <p class="empty-state">Loading users...</p>
            </div>
        </div>

    </div>
</div>

<script src="../js/admin.js"></script>
</body>
</html>
