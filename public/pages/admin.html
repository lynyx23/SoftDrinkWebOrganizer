<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Admin Dashboard</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/admin.css" rel="stylesheet">
</head>

<body class="retro-theme">

    <nav class="retro-nav">
        <div class="nav-brand">
            <a href="../../index.html">The Soda Aisle</a>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="sodalist.html">Catalog</a>
            <a href="stats.html">Store Stats</a>

            <a href="lists.html" class="nav-auth-only hidden">My Lists</a>
            <a href="groups.html" class="nav-auth-only hidden">My Groups</a>

            <a href="login.html" class="nav-guest-only">Sign In</a>
            <a href="register.html" class="nav-btn nav-guest-only cart-btn">Get a Cart</a>

            <a href="profile.html" class="nav-btn nav-auth-only hidden profile-nav-btn" id="profileBtn">My Profile</a>
            <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
            <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
        </div>
    </nav>

    <script src="../js/nav.js"></script>

    <h1 class="admin-heading">Admin Dashboard</h1>

    <div id="admin-content" class="admin-content-hidden">
        <div class="admin-container">
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>Pending Approvals</h2>
                    <button class="retro-btn small-btn" id="refreshSubmissionsBtn">Refresh</button>
                </div>
                <div class="retro-list-container" id="submissions-container">
                    <p class="empty-state">Loading submissions...</p>
                </div>
            </div>
            <div class="admin-section">
                <div class="admin-section-header">
                    <h2>Manage Users</h2>
                    <button class="retro-btn small-btn" id="refreshUsersBtn">Refresh</button>
                </div>
                <div class="retro-list-container" id="users-container">
                    <p class="empty-state">Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
