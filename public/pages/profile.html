<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>My Profile - Beverage Aisle</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/profile.css" rel="stylesheet">
    <link href="../images/icon1.png" rel="icon" type="image/x-icon">
</head>
<body class="retro-theme">

    <nav class="retro-nav">
    <div class="nav-brand">
        <a href="../../index.html">The Soda Aisle</a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="sodalist.html">Catalog</a>
        
        <a href="login.html" class="nav-guest-only">Sign In</a>
        <a href="register.html" class="nav-btn nav-guest-only">Get a Cart</a>
        
        <a href="profile.html" class="nav-btn nav-auth-only hidden" style="background-color: var(--mint); color: var(--dark-text); margin-right: 5px;">My Profile</a>
        <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
        <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
    </div>
    </nav>

    <script src="../js/nav.js"></script>

<div class="profile-container">
    <div class="profile-header-section">
        <div class="script-accent">Welcome to your</div>
        <h1 class="store-title">Soda Profile</h1>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="profile-info-banner">
        <div class="avatar-wrapper">
            <img alt="Avatar" id="profileImage" src="../images/icon1.png">
        </div>
        <div class="user-details">
            <h2 id="profileUsername">Loading...</h2>
            <p><strong>Email:</strong> <span id="profileEmail">...</span></p>
            <p><strong>Role:</strong> <span class="badge" id="profileRole">...</span></p>
            <p><strong>Joined:</strong> <span id="profileJoined">...</span></p>

            <div class="avatar-update-form">
                <label for="avatarInput"></label><input id="avatarInput" placeholder="New avatar URL..." type="text">
                <button class="retro-btn small-btn" id="updateAvatarBtn">Update Pic</button>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-card" style="grid-column: 1 / -1; background-color: var(--mint);">
            <h3>✏️ Rate a Beverage</h3>
            <p style="margin-bottom: 15px;">Add or update your preference for a drink in our catalog.</p>
            
            <form id="addPreferenceForm" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label for="bevSelect">Select Beverage</label>
                    <select id="bevSelect" required style="width: 100%; padding: 12px; border: 3px solid var(--dark-text); border-radius: 6px; font-family: 'DM Sans', sans-serif;">
                        <option value="">Loading catalog...</option>
                    </select>
                </div>
                
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="bevRating">Rating (1-5)</label>
                    <input type="number" id="bevRating" min="1" max="5" required style="width: 100%;">
                </div>
                
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label for="bevNotes">Personal Notes</label>
                    <input type="text" id="bevNotes" placeholder="e.g., Best with ice!" style="width: 100%;">
                </div>
                
                <button type="submit" class="retro-btn small-btn" style="background-color: var(--dark-text); color: var(--white);">Save</button>
            </form>
        </div>
    </div>

    <div class="profile-actions">
        <a class="retro-btn" href="../../index.html">Back to Store</a>
        <button class="retro-btn logout-btn" id="logoutBtn">Log Out</button>
    </div>
</div>

<script src="../js/profile.js"></script>
</body>
</html>
