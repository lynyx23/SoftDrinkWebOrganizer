<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>My Profile - Beverage Aisle</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/profile.css" rel="stylesheet">
    <link href="../images/icon1.png" rel="icon" type="image/x-icon">
</head>
<body class="retro-theme">

    <nav class="retro-nav">
    <div class="nav-brand">
        <a href="../../index.html">The Soda Aisle</a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="sodalist.html">Catalog</a>
        
        <a href="login.html" class="nav-guest-only">Sign In</a>
        <a href="register.html" class="nav-btn nav-guest-only">Get a Cart</a>
        
        <a href="profile.html" class="nav-auth-only hidden">Profile</a>
        <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
        <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
    </div>
    </nav>

    <script src="../js/nav.js"></script>

<div class="profile-container">
    <div class="profile-header-section">
        <div class="script-accent">Welcome to your</div>
        <h1 class="store-title">Soda Profile</h1>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="profile-info-banner">
        <div class="avatar-wrapper">
            <img alt="Avatar" id="profileImage" src="../images/icon1.png">
        </div>
        <div class="user-details">
            <h2 id="profileUsername">Loading...</h2>
            <p><strong>Email:</strong> <span id="profileEmail">...</span></p>
            <p><strong>Role:</strong> <span class="badge" id="profileRole">...</span></p>
            <p><strong>Joined:</strong> <span id="profileJoined">...</span></p>

            <div class="avatar-update-form">
                <label for="avatarInput"></label><input id="avatarInput" placeholder="New avatar URL..." type="text">
                <button class="retro-btn small-btn" id="updateAvatarBtn">Update Pic</button>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dashboard-card">
            <h3>Dietary Profile</h3>
            <div class="tag-container" id="restrictionsList">
                <p class="empty-state">Loading...</p>
            </div>
        </div>

        <div class="dashboard-card">
            <h3>Top Rated Sodas</h3>
            <ul class="retro-list" id="preferencesList">
                <p class="empty-state">Loading...</p>
            </ul>
        </div>

        <div class="dashboard-card">
            <h3>My Groups</h3>
            <ul class="retro-list" id="groupsList">
                <p class="empty-state">Loading...</p>
            </ul>
        </div>

        <div class="dashboard-card">
            <h3>Active Shopping Lists</h3>
            <ul class="retro-list" id="shoppingLists">
                <p class="empty-state">Loading...</p>
            </ul>
        </div>
    </div>

    <div class="profile-actions">
        <a class="retro-btn" href="../../index.html">Back to Store</a>
        <button class="retro-btn logout-btn" id="logoutBtn">Log Out</button>
    </div>
</div>

<script src="../js/profile.js"></script>
</body>
</html>
