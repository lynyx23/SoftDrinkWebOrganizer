<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Manage Beverage</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/admin.css" rel="stylesheet">
    <link href="../css/edit-beverage.css" rel="stylesheet">
</head>

<body class="retro-theme">
<h1 class="admin-heading" id="pageTitle">Add New Beverage</h1>

<div class="admin-container">
    <div class="admin-section">

        <div class="form-group off-fetcher-group">
            <label for="bevBarcode">Fetch from Open Food Facts (Barcode / EAN)</label>
            <div class="off-input-wrapper">
                <input id="bevBarcode" placeholder="e.g., 5449000000996" type="text">
                <button class="retro-btn small-btn" id="fetchOffBtn" type="button">Fetch</button>
            </div>
            <small class="off-status-text" id="offStatus"></small>
        </div>

        <form id="beverageForm">
            <input id="originalBeverageId" type="hidden" value="">
            <input id="submissionId" type="hidden" value="">

            <h2 class="form-section-header">Basic Info</h2>

            <div class="form-group">
                <label for="bevName">Name</label>
                <input id="bevName" required type="text">
            </div>
            <div class="form-group">
                <label for="bevCategory">Category</label>
                <input id="bevCategory" required type="text">
            </div>
            <div class="form-group">
                <label for="bevPrice">Price (RON)</label>
                <input id="bevPrice" required step="0.01" type="number">
            </div>
            <div class="form-group">
                <label for="bevVolume">Volume (ml)</label>
                <input id="bevVolume" type="number">
            </div>
            <div class="form-group">
                <label for="bevPackaging">Packaging (e.g., Can, Glass)</label>
                <input id="bevPackaging" type="text">
            </div>
            <div class="form-group">
                <label for="bevImage">Image URL</label>
                <input id="bevImage" type="text">
            </div>

            <div class="image-preview-container" id="imagePreviewContainer">
                <div class="image-placeholder" id="imagePlaceholder">
                    <span class="placeholder-text">🫙 No images left in stock!</span>
                </div>
                <img alt="Beverage Preview" class="hidden" id="image-preview"
                     src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            </div>

            <h2 class="form-section-header">Nutrition & Details</h2>

            <div class="form-group">
                <label for="bevDescription">Description</label>
                <textarea id="bevDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="bevIngredients">Ingredients</label>
                <textarea id="bevIngredients" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Nutritional Info (per 100g/ml)</label>
                <div class="nutrition-grid">
                    <div class="form-group"><label for="nutriKcal">Kcal</label><input id="nutriKcal" type="number"
                                                                                      step="0.1"></div>
                    <div class="form-group"><label for="nutriFat">Fat (g)</label><input id="nutriFat" type="number"
                                                                                        step="0.1"></div>
                    <div class="form-group"><label for="nutriSatFat">Sat. Fat (g)</label><input id="nutriSatFat"
                                                                                                type="number"
                                                                                                step="0.1"></div>
                    <div class="form-group"><label for="nutriCarbs">Carbs (g)</label><input id="nutriCarbs"
                                                                                            type="number" step="0.1">
                    </div>
                    <div class="form-group"><label for="nutriSugars">Sugars (g)</label><input id="nutriSugars"
                                                                                              type="number" step="0.1">
                    </div>
                    <div class="form-group"><label for="nutriProtein">Protein (g)</label><input id="nutriProtein"
                                                                                                type="number"
                                                                                                step="0.1"></div>
                    <div class="form-group"><label for="nutriSalt">Salt (g)</label><input id="nutriSalt" type="number"
                                                                                          step="0.1"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="bevNutriscore">Nutri-Score</label>
                <select id="bevNutriscore">
                    <option value="">-- Unknown --</option>
                    <option value="a">A - Very Good</option>
                    <option value="b">B - Good</option>
                    <option value="c">C - Moderate</option>
                    <option value="d">D - Poor</option>
                    <option value="e">E - Very Poor</option>
                </select>
            </div>

            <h2 class="form-section-header">Dietary Tags & Allergens</h2>
            <div id="restrictionsContainer" class="checkbox-group"
                 style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                <p class="empty-state">Loading restrictions...</p>
            </div>

            <h2 class="form-section-header">Sourcing & Availability</h2>

            <div class="form-group">
                <label for="bevCountries">Countries</label>
                <input id="bevCountries" placeholder="e.g., Romania, France" type="text">
            </div>
            <div class="form-group">
                <label for="bevSeason">Season Availability</label>
                <input id="bevSeason" placeholder="e.g., Summer, Winter, All year" type="text">
            </div>
            <div class="form-group">
                <label for="bevRegion">Geographic Region</label>
                <input id="bevRegion" placeholder="e.g., Eastern Europe, Asia" type="text">
            </div>
            <div class="form-group">
                <label for="bevVenue">Specific Venue (if applicable)</label>
                <input id="bevVenue" placeholder="e.g., Joe's Diner, Lidl" type="text">
            </div>

            <div class="form-group checkbox-group">
                <label for="bevPerishable">Is Perishable?</label>
                <input id="bevPerishable" type="checkbox" value="1">
            </div>

            <div class="form-group">
                <label for="bevValidityDays">Validity (Days) - If Perishable</label>
                <input id="bevValidityDays" placeholder="e.g., 5" type="number">
            </div>

            <div class="action-buttons-container" id="actionButtons">
            </div>
        </form>
    </div>
</div>

<script src="../js/edit-beverage.js"></script>
</body>

</html>
