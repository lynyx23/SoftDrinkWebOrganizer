<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Register - Beverage Web Organizer</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/auth.css" rel="stylesheet">
</head>
<body class="retro-theme">
<div class="auth-container">
    <div class="script-accent">Grab a cart for the</div>
    <h1 class="store-title">Soda Aisle</h1>

    <div class="error-message" id="errorMessage"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" required type="text">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" required type="email">
        </div>

        <div class="form-group">
            <label for="password">Password (Min 6 chars)</label>
            <input id="password" minlength="6" name="password" required type="password">
        </div>

        <button class="retro-btn" type="submit">Register</button>
    </form>

    <div class="toggle-link">
        Already have a list? <a href="login.html">Sign in</a>
    </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
