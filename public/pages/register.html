<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Beverage Web Organizer</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="script-accent">Grab a cart for the</div>
        <h1 class="store-title">Soda Aisle</h1>
        
        <div id="errorMessage" class="error-message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password (Min 6 chars)</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <button type="submit" class="retro-btn">Register</button>
        </form>

        <div class="toggle-link">
            Already have a list? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
