<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login - Beverage Aisle</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/auth.css" rel="stylesheet">
    <link href="../images/icon1.png" rel="icon" type="image/x-icon">
</head>
<body class="retro-theme">

    <nav class="retro-nav">
        <div class="nav-brand">
            <a href="../../index.html">The Soda Aisle</a>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="sodalist.html">Catalog</a>
            <a href="stats.html">Store Stats</a>
            
            <a href="lists.html" class="nav-auth-only hidden">My Lists</a>
            
            <a href="login.html" class="nav-guest-only">Sign In</a>
            <a href="register.html" class="nav-btn nav-guest-only cart-btn">Get a Cart</a>
            
            <a href="profile.html" class="nav-btn nav-auth-only hidden profile-nav-btn" id="profileBtn">My Profile</a>
            <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
            <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
        </div>
    </nav>
    
    <script src="../js/nav.js"></script>

<div class="auth-container">
    <div class="script-accent">Welcome back to the</div>
    <h1 class="store-title">Beverage Aisle</h1>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input autocomplete="username" id="username" name="username" required type="text">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input autocomplete="current-password" id="password" name="password" required type="password">
        </div>

        <button class="retro-btn" type="submit">Sign In</button>
    </form>

    <div class="toggle-link">
        Need a cart? <a href="register.html">Register here</a>
    </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
