<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Beverage Aisle</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="icon" type="image/x-icon" href="../images/icon1.png">
</head>
<body>
    <div class="auth-container">
        <div class="script-accent">Welcome back to the</div>
        <h1 class="store-title">Beverage Aisle</h1>
        
        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="retro-btn">Sign In</button>
        </form>

        <div class="toggle-link">
            Need a cart? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const errorContainer = document.getElementById('errorMessage');

            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    errorContainer.textContent = ''; // Clear old errors
                    
                    const payload = {
                        username: loginForm.username.value.trim(),
                        password: loginForm.password.value
                    };

                    try {
                        const response = await fetch('/api/users/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        const data = await response.json();

                        if (!response.ok || !data.success) {
                            throw new Error(data.message || 'An error occurred');
                        }

                        localStorage.setItem('auth_token', data.data.token);
                        
                        window.location.href = '../../index.html';
                        
                    } catch (error) {
                        errorContainer.textContent = error.message;
                    }
                });
            }
        });
    </script>
</body>
</html>
