<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopping Lists</title>
    <link href="../css/base.css" rel="stylesheet">
    <link href="../css/profile.css" rel="stylesheet">
</head>
<body class="retro-theme">

    <nav class="retro-nav">
        <div class="nav-brand"><a href="../../index.html">The Soda Aisle</a></div>
        <div class="nav-links" id="navLinks">
            <a href="sodalist.html">Catalog</a>
            <a href="lists.html" class="nav-auth-only hidden" style="border-bottom: 2px solid var(--washed-red);">My Lists</a>
            <a href="profile.html" class="nav-btn nav-auth-only hidden profile-nav-btn">My Profile</a>
            <a href="admin.html" class="nav-auth-only hidden" id="navAdminBtn">Admin Panel</a>
            <button class="nav-btn nav-auth-only hidden" id="navLogoutBtn">Log Out</button>
        </div>
    </nav>
    <script src="../js/nav.js"></script>

    <div class="profile-container">
        <div class="profile-header-section">
            <div class="script-accent">Prepare your cart</div>
            <h1 class="store-title">Shopping Lists</h1>
        </div>

        <div class="dashboard-card" style="background-color: var(--mint);">
            <form id="createListForm" style="display: flex; gap: 10px;">
                <input type="text" id="newListName" placeholder="New list name (e.g. Weekend Party)" required style="flex: 1; padding: 10px; border: 3px solid var(--dark-text); border-radius: 6px; font-family: 'DM Sans';">
                <button type="submit" class="retro-btn small-btn" style="background: var(--dark-text); color: white;">Create List</button>
            </form>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <div class="dashboard-card">
                <h3>My Carts</h3>
                <ul class="retro-list" id="myListsContainer">
                    <li class="empty-state">Loading...</li>
                </ul>
            </div>

            <div class="dashboard-card" id="listDetailsCard">
                <h3 id="currentListTitle">Select a list to view items</h3>
                <ul class="retro-list" id="listItemsContainer">
                    <li class="empty-state">👈 Pick a list from the left</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="../js/lists.js"></script>
</body>
</html>
